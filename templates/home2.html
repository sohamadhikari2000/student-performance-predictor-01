<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Predictor</title>
<!-- Bootstrap + Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(to right, #667eea, #764ba2);
        transition: 0.3s;
    }

    .dark-mode {
        background: #121212 !important;
        color: white;
    }

    .card {
        border-radius: 15px;
        animation: fadeIn 0.8s ease-in-out;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(20px);}
        to {opacity: 1; transform: translateY(0);}
    }

    .spinner {
        display: none;
    }

    .result-box {
        animation: pop 0.6s ease;
    }

    @keyframes pop {
        0% {transform: scale(0.8); opacity: 0;}
        100% {transform: scale(1); opacity: 1;}
    }
</style>

</head>

<body id="body">

<!-- Navbar -->

<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand mb-0 h1">
        <i class="bi bi-mortarboard-fill"></i> Student Predictor
    </span>
<button class="btn btn-outline-light" onclick="toggleDarkMode()">
    <i class="bi bi-moon"></i> Dark Mode
</button>


</nav>

<div class="container d-flex justify-content-center align-items-center min-vh-100">

<div class="card shadow-lg p-4 w-100" style="max-width: 500px;">

    <h3 class="text-center mb-3">
        <i class="bi bi-bar-chart-line"></i> Performance Predictor
    </h3>

    <form id="form" action="{{ url_for('predict_datapoint')}}" method="POST" onsubmit="showSpinner()">

        <div class="mb-3">
            <label class="form-label">Gender</label>
            <select class="form-select" name="gender" required>
                <option selected disabled value="">Select</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Ethnicity</label>
            <select class="form-select" name="ethnicity" required>
                <option selected disabled value="">Select</option>
                <option value="group A">Group A</option>
                <option value="group B">Group B</option>
                <option value="group C">Group C</option>
                <option value="group D">Group D</option>
                <option value="group E">Group E</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Parental Education</label>
            <select class="form-select" name="parental_level_of_education" required>
                <option selected disabled value="">Select</option>
                <option value="associate's degree">Associate</option>
                <option value="bachelor's degree">Bachelor</option>
                <option value="high school">High School</option>
                <option value="master's degree">Master</option>
                <option value="some college">Some College</option>
                <option value="some high school">Some High School</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Lunch</label>
            <select class="form-select" name="lunch" required>
                <option selected disabled value="">Select</option>
                <option value="standard">Standard</option>
                <option value="free/reduced">Free/Reduced</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Test Prep</label>
            <select class="form-select" name="test_preparation_course" required>
                <option selected disabled value="">Select</option>
                <option value="none">None</option>
                <option value="completed">Completed</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Reading Score</label>
            <input class="form-control" type="number" name="reading_score" min="0" max="100" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Writing Score</label>
            <input class="form-control" type="number" name="writing_score" min="0" max="100" required>
        </div>

        <div class="d-grid">
            <button class="btn btn-primary btn-lg">
                <i class="bi bi-lightning-charge"></i> Predict your Maths score
            </button>
        </div>

        <!-- Spinner -->
        <div class="text-center mt-3 spinner" id="spinner">
            <div class="spinner-border text-primary"></div>
        </div>

    </form>

    {% if results %}
    <div class="text-center mt-4 result-box">

        <h5>Prediction Result</h5>

        {% if results|int < 40 %}
            <span class="badge bg-danger p-3">Fail 😢 ({{ results }})</span>
        {% elif results|int < 70 %}
            <span class="badge bg-warning text-dark p-3">Average 🙂 ({{ results }})</span>
        {% else %}
            <span class="badge bg-success p-3">Excellent 🎉 ({{ results }})</span>
        {% endif %}

    </div>
    {% endif %}

</div>

</div>

<script>
function toggleDarkMode() {
    document.getElementById("body").classList.toggle("dark-mode");
}

function showSpinner() {
    document.getElementById("spinner").style.display = "block";
}
</script>

</body>
</html>
